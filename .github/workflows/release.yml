name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag metadata
        id: release_meta
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag format: $TAG_NAME"
            echo "Expected format: v<major>.<minor>.<patch>"
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_version=${TAG_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag commit (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          git fetch --tags --force
          git checkout "refs/tags/${{ steps.release_meta.outputs.tag_name }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: |
          set -euo pipefail
          npm install -g npm@^11.5.1
          npm --version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Lint Markdown
        run: bun run docs:lint

      - name: Docs Sync Check
        run: bun run docs:check

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          TAG_VERSION="${{ steps.release_meta.outputs.tag_version }}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Pack
        run: npm pack

      - name: Check if version already exists on npm
        id: npm_version
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "npm already has ${PACKAGE_NAME}@${PACKAGE_VERSION}; skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "npm does not have ${PACKAGE_NAME}@${PACKAGE_VERSION}; publish will run."
          fi

      - name: Verify OIDC is available for trusted publishing
        if: steps.npm_version.outputs.already_published != 'true'
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC env vars are missing (ACTIONS_ID_TOKEN_REQUEST_URL/TOKEN)."
            echo "Enable id-token: write and allow OIDC in repo/org Actions settings."
            exit 1
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          npm publish --access public --provenance

      - name: Publish auth troubleshooting hint
        if: failure() && steps.npm_version.outputs.already_published != 'true'
        run: |
          echo "npm publish authentication failed."
          echo "Configure one of these:"
          echo "1) npm trusted publisher for cpauldev/universal-bridge + release.yml (recommended)"
          echo "2) repository secret NPM_TOKEN (granular publish token)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag_name }}
          generate_release_notes: true
          files: "*.tgz"
